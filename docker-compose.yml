services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'

  rover-mock:
    build: ./mock-services/rover-mock
    ports:
      - '4001:4001'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rover_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 4001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  vader-mock:
    build: ./mock-services/vader-mock
    ports:
      - '4002:4002'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vader_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 4002
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4002/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  gateway:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - '8080:8080'
    environment:
      ROVER_SERVICE_URL: http://rover-mock:4001
      VADER_SERVICE_URL: http://vader-mock:4002
      JWT_SECRET: super-secret-jwt-key
      PORT: 8080
    depends_on:
      rover-mock:
        condition: service_healthy
      vader-mock:
        condition: service_healthy

volumes:
  postgres_data:
