services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  rover-mock:
    build: ./mock-services/rover-mock
    ports:
      - "4001:4001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rover_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 4001
    depends_on:
      postgres:
        condition: service_healthy

  vader-mock:
    build: ./mock-services/vader-mock
    ports:
      - "4002:4002"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vader_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 4002
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      ROVER_SERVICE_URL: http://rover-mock:4001
      VADER_SERVICE_URL: http://vader-mock:4002
      SESSION_SECRET: super-secret-key
      PORT: 8080
    depends_on:
      - rover-mock
      - vader-mock

volumes:
  postgres_data:
