services:
  # The Subgraph for Content/Authors
  rover-mock:
    build: ./mock-services/rover-mock
    ports:
      - "4001:4001"

  # The Subgraph for Products/Junctions
  vader-mock:
    build: ./mock-services/vader-mock
    ports:
      - "4002:4002"

  # The BFF (Gateway + Express + React Static Assets)
  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ROVER_SERVICE_URL=http://rover-mock:4001
      - VADER_SERVICE_URL=http://vader-mock:4002
      - SESSION_SECRET=super-secret-key
    depends_on:
      - rover-mock
      - vader-mock